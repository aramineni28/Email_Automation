services:
  app:
    build: .
    container_name: recruiter_app
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    entrypoint: ["python", "-m", "app.main"]

  db:
    image: postgres:15
    container_name: recruiter_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: recruiters
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./init.sql:/docker-entrypoint-initdb.d/init.sql  
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: recruiter_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  redis_data: